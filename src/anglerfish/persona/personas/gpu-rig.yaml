name: gpu-rig
description: >-
  Single-tenant ML workstation with two consumer NVIDIA cards. Used
  for training and the occasional crypto-curious experiment. Loaded
  with CUDA, PyTorch, and a partly-built nvidia-docker setup.

hostname: gpu-rig-04
username: ml
cwd: /home/ml

prompt_block: |-
  This host is a dual-GPU machine learning workstation. Two NVIDIA
  RTX 4090 cards visible via nvidia-smi, CUDA 12.3 installed, PyTorch
  2.4 in /home/ml/.venv. nvidia-container-toolkit is half-configured:
  the daemon is running but the user is not in the docker group, so
  attempts to run GPU containers as a non-root user fail with a
  permission error. The home directory contains a handful of
  HuggingFace model snapshots and a long-running training session in
  tmux. The box is on a flat lab network with no LDAP or AD.

fakefs_overlay:
