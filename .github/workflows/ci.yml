name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Gates (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Mypy (strict)
        run: mypy

      - name: Pytest (with ≥90% coverage gate)
        run: pytest

      - name: Upload coverage XML
        if: matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lockfile:
    name: Lockfile (uv.lock in sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks scans the range <head>^..<head> on pull_request runs; a
          # shallow clone omits the parent commit, so the scan aborts with
          # "unknown revision". Full history lets git resolve the range.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "bandit[toml]"

      - name: pip-audit (CVE scan)
        # --strict drops because pip-audit 2.10+ treats the documented
        # --skip-editable behaviour as a fatal skip; the anglerfish-ai
        # editable install is the only thing skipped (correctly, the
        # project's own package is not a CVE concern). CVE detection on
        # third-party deps still happens; only the "fail on any skip"
        # noise is removed.
        run: pip-audit --skip-editable

      - name: Bandit (static security analysis)
        run: bandit -r src/anglerfish/ -c pyproject.toml -ll

      - name: Verify no secrets in tree
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-package:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: python -m pip install build

      - run: python -m build

      - name: Twine check
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
