name: Dependency audit

on:
  schedule:
    # Daily at 06:27 UTC. Off the hour to avoid GH scheduling stampedes.
    - cron: "27 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - id: audit
        name: Run pip-audit
        run: |
          set +e
          pip-audit --skip-editable --strict --format=json > audit.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          set -e
          echo "--- pip-audit human-readable ---"
          pip-audit --skip-editable --strict || true

      - name: Open issue on findings
        if: steps.audit.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
            const today = new Date().toISOString().slice(0, 10);
            const title = `pip-audit: vulnerable dependencies detected (${today})`;
            const body = [
              "Daily `pip-audit` reported one or more vulnerabilities.",
              "",
              "```json",
              JSON.stringify(audit, null, 2).slice(0, 28000),
              "```",
              "",
              "Run `pip-audit --skip-editable --strict` locally to triage.",
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies',
            });
            const already = existing.data.find(i => i.title === title);
            if (already) {
              core.info(`Issue already open: #${already.number}`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dependencies'],
            });
