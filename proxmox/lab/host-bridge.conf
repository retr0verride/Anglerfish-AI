# Air-gapped bait bridge for the Anglerfish AI lab setup.
#
# Append this stanza to /etc/network/interfaces on the Proxmox host. The
# critical line is `bridge-ports none` — the bridge has NO physical
# uplink, so attacker traffic from outside the host CANNOT reach the
# honeypot. Lab traffic comes from another VM on the same host (a
# Kali/Caldera/replay-tool VM) attached to vmbr-lab.
#
# After saving the file:
#
#     ifreload -a            # apply without rebooting
#     ip -br link show vmbr-lab
#     # vmbr-lab          UP             <BROADCAST,MULTICAST,UP,LOWER_UP>
#
# To return to the production deployment (real uplink), bring this bridge
# down and use vmbr-bait from ../anglerfish.json instead.

auto vmbr-lab
iface vmbr-lab inet manual
    bridge-ports none
    bridge-stp off
    bridge-fd 0
    bridge-vlan-aware no
    # No IP on the host side either — operators reach the honeypot via
    # vmbr-service (the operator-facing bridge), not via vmbr-lab.

# Optional: a second isolated bridge for the *replay* VM, separated
# from the bait bridge by a VLAN tag so PCAPs can distinguish the
# attacker side from the replay side at capture time. Uncomment if
# you want that level of forensic clarity.
#
# auto vmbr-replay
# iface vmbr-replay inet manual
#     bridge-ports none
#     bridge-stp off
#     bridge-fd 0
